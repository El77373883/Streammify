<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1DB954">
  <title>Streamify · Crear Perfil</title>
  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAP5pHkk4Cm5-d6btJCN1MSLQBH699cV-0",
      authDomain: "project-8fc84ba4-98a9-4394-b66.firebaseapp.com",
      projectId: "project-8fc84ba4-98a9-4394-b66",
      storageBucket: "project-8fc84ba4-98a9-4394-b66.firebasestorage.app",
      messagingSenderId: "873347768381",
      appId: "1:873347768381:web:75cdd37df970ba14984a54"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    window.auth = auth;
    window.db = db;
    window.doc = doc;
    window.setDoc = setDoc;
    window.getDoc = getDoc;
    window.signInAnonymously = signInAnonymously;
    window.updateProfile = updateProfile;
    window.onAuthStateChanged = onAuthStateChanged;
  </script>
  <style>
    :root {
      --g: #1DB954;
      --bk: #000;
      --d: #121212;
      --d2: #181818;
      --d3: #282828;
      --d4: #3e3e3e;
      --w: #fff;
      --gr: #b3b3b3;
      --gr2: #535353;
      --premium: linear-gradient(135deg, #1DB954 0%, #1ed760 50%, #4a9eff 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bk);
      color: var(--w);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: fixed;
      width: 100%;
      overflow: hidden;
    }

    .container {
      max-width: 500px;
      width: 100%;
      animation: fadeIn 0.6s ease;
      max-height: 100vh;
      overflow-y: auto;
      padding: 10px 0;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--premium);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 24px; height: 24px; fill: white; }

    .logo-text {
      font-size: 28px; font-weight: 900;
      background: var(--premium);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      font-size: 26px; font-weight: 800;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--gr);
      font-size: 15px;
    }

    /* Avatar Preview */
    .avatar-preview-section {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .avatar-preview {
      width: 130px; height: 130px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 55px;
      font-weight: 700;
      border: 3px solid var(--g);
      box-shadow: 0 8px 30px rgba(29, 185, 84, 0.3);
      transition: all 0.2s;
      text-transform: uppercase;
    }

    /* Grid de Avatares */
    .avatar-section { margin-bottom: 32px; }

    .section-label {
      font-size: 15px; font-weight: 600;
      margin-bottom: 16px;
      color: var(--gr);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .avatar-option {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .avatar-option.selected {
      border-color: var(--g);
      transform: scale(0.95);
      box-shadow: 0 0 20px rgba(29, 185, 84, 0.4);
    }

    .avatar-more {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 300;
      cursor: pointer;
      border: 2px dashed var(--gr2);
      background: transparent;
      color: var(--gr);
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      background: var(--d2);
      border-radius: 24px;
      padding: 28px 20px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--d3);
    }

    .modal-title {
      font-size: 20px; font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .modal-close {
      width: 100%;
      background: var(--g);
      border: none;
      border-radius: 40px;
      padding: 14px;
      color: black;
      font-weight: 700;
      margin-top: 20px;
      cursor: pointer;
    }

    /* Nombre */
    .name-section { margin-bottom: 32px; }

    .input-wrapper { position: relative; }

    .input-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px; fill: var(--gr2);
    }

    .name-input {
      width: 100%;
      background: var(--d3);
      border: 1.5px solid transparent;
      border-radius: 16px;
      padding: 18px 18px 18px 52px;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .name-input:focus { border-color: var(--g); background: var(--d4); }

    /* Botón */
    .btn-continue {
      width: 100%;
      background: var(--g);
      border: none;
      border-radius: 40px;
      padding: 18px;
      color: black;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }

    .btn-continue:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: black;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--d2); color: white;
      padding: 14px 28px; border-radius: 60px;
      font-size: 14px; opacity: 0;
      transition: all 0.3s; z-index: 1001;
      border: 1px solid var(--g);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: #e91429; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <span class="logo-text">Streamify</span>
    </div>
    <h1>Crea tu perfil</h1>
    <div class="subtitle">Elige un avatar y un nombre</div>
  </div>

  <div class="avatar-preview-section">
    <div class="avatar-preview" id="avatarPreview" style="background: #1DB954;">S</div>
  </div>

  <div class="avatar-section">
    <div class="section-label">
      <span>Elige tu avatar</span>
      <span style="color: var(--g); font-size: 13px;">20 disponibles</span>
    </div>
    <div class="avatar-grid" id="avatarGrid"></div>
  </div>

  <div class="name-section">
    <div class="section-label">Nombre de perfil</div>
    <div class="input-wrapper">
      <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <input type="text" class="name-input" id="profileName" placeholder="StreamifyUser" maxlength="20" value="StreamifyUser">
    </div>
  </div>

  <button class="btn-continue" id="continueBtn" onclick="saveProfile()">Guardar y continuar</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="avatarModal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Todos los avatares</div>
    <div class="modal-grid" id="modalAvatarGrid"></div>
    <button class="modal-close" onclick="closeModal()">Listo</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const avatars = [
    { letter: 'S', bg: '#1DB954', color: '#fff' }, { letter: 'M', bg: '#9c27b0', color: '#fff' },
    { letter: 'L', bg: '#FF5722', color: '#fff' }, { letter: 'R', bg: '#2196F3', color: '#fff' },
    { letter: 'V', bg: '#E91E63', color: '#fff' }, { letter: 'A', bg: '#FF9800', color: '#000' },
    { letter: 'K', bg: '#00BCD4', color: '#000' }, { letter: 'J', bg: '#FFEB3B', color: '#000' },
    { letter: 'N', bg: '#8BC34A', color: '#000' }, { letter: 'D', bg: '#607D8B', color: '#fff' },
    { letter: 'C', bg: '#F44336', color: '#fff' }, { letter: 'P', bg: '#3F51B5', color: '#fff' },
    { letter: 'T', bg: '#009688', color: '#fff' }, { letter: 'B', bg: '#795548', color: '#fff' },
    { letter: 'E', bg: '#673AB7', color: '#fff' }, { letter: 'F', bg: '#FF4081', color: '#fff' },
    { letter: 'G', bg: '#536DFE', color: '#fff' }, { letter: 'H', bg: '#FF6E40', color: '#000' },
    { letter: 'W', bg: '#64FFDA', color: '#000' }, { letter: 'X', bg: '#B2FF59', color: '#000' }
  ];

  let selectedAvatar = 0;
  let currentUser = null;

  // ===== CREAR USUARIO ANÓNIMO AUTOMÁTICAMENTE =====
  async function createAnonymousUser() {
    try {
      const result = await signInAnonymously(auth);
      currentUser = result.user;
      
      const randomName = 'StreamifyUser' + Math.floor(Math.random() * 10000);
      document.getElementById('profileName').value = randomName;
      
      await setDoc(doc(db, 'users', currentUser.uid), {
        name: randomName,
        email: null,
        plan: 'free',
        profile: null,
        setupComplete: false,
        isAnonymous: true,
        createdAt: new Date().toISOString()
      });
      
      showToast('🎉 ¡Perfil temporal creado!');
      renderAvatarGrid();
      renderModalGrid();
      updateAvatarPreview();
    } catch (error) {
      console.error('Error:', error);
      showToast('Error al crear perfil', true);
    }
  }

  // ===== INICIALIZACIÓN =====
      function initAuth() {
    if (!window.auth) { setTimeout(initAuth, 100); return; }
    onAuthStateChanged(auth, async (user) => {
      
    if (!user) {
      await createAnonymousUser();
      return;
    }
    
    currentUser = user;
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    
    if (userDoc.exists()) {
      const data = userDoc.data();
      if (data.profile?.name) {
        window.location.href = 'index.html';
        return;
      }
      if (data.name) document.getElementById('profileName').value = data.name;
            if (data.profile?.avatar !== undefined) selectedAvatar = data.profile.avatar;
    }
    
    renderAvatarGrid();
    renderModalGrid();
    updateAvatarPreview();
  });
}
initAuth();


  function renderAvatarGrid() {
    const grid = document.getElementById('avatarGrid');
    const visibleAvatars = avatars.slice(0, 5);
    grid.innerHTML = visibleAvatars.map((av, i) => `
      <div class="avatar-option ${i === selectedAvatar ? 'selected' : ''}" 
           style="background: ${av.bg}; color: ${av.color};"
           onclick="selectAvatar(${i})">${av.letter}</div>
    `).join('') + `<div class="avatar-more" onclick="openModal()">+</div>`;
  }

  function renderModalGrid() {
    const grid = document.getElementById('modalAvatarGrid');
    grid.innerHTML = avatars.map((av, i) => `
      <div class="avatar-option ${i === selectedAvatar ? 'selected' : ''}" 
           style="background: ${av.bg}; color: ${av.color};"
           onclick="selectAvatar(${i}); closeModal();">${av.letter}</div>
    `).join('');
  }

  function selectAvatar(index) {
    selectedAvatar = index;
    renderAvatarGrid();
    renderModalGrid();
    updateAvatarPreview();
  }

  function updateAvatarPreview() {
    const av = avatars[selectedAvatar];
    const preview = document.getElementById('avatarPreview');
    preview.textContent = av.letter;
    preview.style.background = av.bg;
    preview.style.color = av.color;
  }

  function openModal() { document.getElementById('avatarModal').style.display = 'flex'; }
  function closeModal() { document.getElementById('avatarModal').style.display = 'none'; }

  document.addEventListener('click', (e) => {
    const modal = document.getElementById('avatarModal');
    if (e.target === modal) closeModal();
  });

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    if (isError) t.classList.add('error');
    else t.classList.remove('error');
    setTimeout(() => t.classList.remove('show', 'error'), 3000);
  }

  async function saveProfile() {
    const name = document.getElementById('profileName').value.trim();
    const btn = document.getElementById('continueBtn');
    
    if (!name) { showToast('Ingresa un nombre de perfil', true); return; }
    if (!currentUser) { showToast('Error de autenticación', true); return; }
    
    btn.innerHTML = '<span class="spinner"></span> Guardando...';
    btn.disabled = true;
    
    try {
      const av = avatars[selectedAvatar];
      await setDoc(doc(db, 'users', currentUser.uid), {
        name: name,
        plan: 'free',
        profile: {
          name: name,
          avatar: selectedAvatar,
          avatarLetter: av.letter,
          avatarBg: av.bg,
          avatarColor: av.color,
          createdAt: new Date().toISOString()
        },
        setupComplete: true,
        isAnonymous: false
      }, { merge: true });
      
      localStorage.setItem('userName', name);
      localStorage.setItem('userAvatar', selectedAvatar);
      
      showToast('✅ ¡Perfil creado! Bienvenido');
      setTimeout(() => window.location.href = 'gratis.html', 1000);
    } catch (error) {
      showToast('Error al guardar', true);
      btn.innerHTML = 'Guardar y continuar';
      btn.disabled = false;
    }
  }

  window.selectAvatar = selectAvatar;
  window.openModal = openModal;
  window.closeModal = closeModal;
  window.saveProfile = saveProfile;
</script>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</body>
</html>
