<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Streamify · Música sin límites</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    /* Pantalla de intro */
    .intro-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeOut 0.8s ease-in-out 3.5s forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* Contenedor del logo */
    .logo-container {
      position: relative;
      animation: logoFloat 3s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Logo principal */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: logoGlow 2s ease-in-out infinite alternate;
    }

    @keyframes logoGlow {
      0% { filter: drop-shadow(0 0 20px rgba(29, 185, 84, 0.3)); }
      100% { filter: drop-shadow(0 0 50px rgba(29, 185, 84, 0.8)); }
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1DB954, #1ed760, #4a9eff);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: iconPulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 60px rgba(29, 185, 84, 0.5);
    }

    @keyframes iconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .logo-icon svg {
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }

    .logo-text {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 0%, #1DB954 40%, #4a9eff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textReveal 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
      transform: translateX(-20px);
    }

    @keyframes textReveal {
      0% { opacity: 0; transform: translateX(-30px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    /* Slogan */
    .slogan {
      margin-top: 20px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      animation: sloganFade 1.5s ease 1s forwards;
      opacity: 0;
    }

    @keyframes sloganFade {
      0% { opacity: 0; letter-spacing: 10px; }
      100% { opacity: 1; letter-spacing: 6px; }
    }

    /* Barra de carga premium */
    .loading-bar {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .loading-fill {
      height: 100%;
      background: linear-gradient(90deg, #1DB954, #1ed760, #4a9eff, #1DB954);
      background-size: 300% 100%;
      border-radius: 10px;
      animation: loading 3s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                 gradientShift 2s ease infinite;
      width: 0%;
    }

    @keyframes loading {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Partículas de fondo */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #1DB954;
      border-radius: 50%;
      opacity: 0.3;
      animation: particleFloat 8s linear infinite;
    }

    @keyframes particleFloat {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    /* Ondas de sonido */
    .sound-waves {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 40px;
      opacity: 0.4;
    }

    .wave {
      width: 4px;
      background: linear-gradient(to top, #1DB954, #4a9eff);
      border-radius: 4px;
      animation: waveAnim 1.2s ease-in-out infinite;
    }

    .wave:nth-child(1) { height: 20px; animation-delay: 0s; }
    .wave:nth-child(2) { height: 35px; animation-delay: 0.1s; }
    .wave:nth-child(3) { height: 25px; animation-delay: 0.2s; }
    .wave:nth-child(4) { height: 40px; animation-delay: 0.3s; }
    .wave:nth-child(5) { height: 15px; animation-delay: 0.4s; }
    .wave:nth-child(6) { height: 30px; animation-delay: 0.5s; }
    .wave:nth-child(7) { height: 20px; animation-delay: 0.6s; }

    @keyframes waveAnim {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.5); }
    }

    /* Texto "Cargando..." */
    .loading-text {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    /* Mensaje de bienvenida */
    .welcome-message {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      animation: welcomeFade 2s ease 0.5s forwards;
      opacity: 0;
    }

    @keyframes welcomeFade {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .logo-icon {
        width: 60px;
        height: 60px;
        border-radius: 18px;
      }
      .logo-icon svg {
        width: 36px;
        height: 36px;
      }
      .logo-text {
        font-size: 36px;
      }
      .slogan {
        font-size: 12px;
        letter-spacing: 4px;
      }
      .welcome-message {
        font-size: 12px;
        bottom: 100px;
      }
    }
  </style>
</head>
<body>

  <!-- Pantalla de Intro -->
  <div class="intro-screen">
    <!-- Partículas de fondo -->
    <div class="particles" id="particles"></div>

    <!-- Ondas de sonido -->
    <div class="sound-waves">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>

    <!-- Logo principal -->
    <div class="logo-container">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
          </svg>
        </div>
        <span class="logo-text">Streamify</span>
      </div>
    </div>

    <!-- Slogan -->
    <div class="slogan">MÚSICA SIN LÍMITES</div>

    <!-- Mensaje de bienvenida dinámico -->
    <div class="welcome-message" id="welcomeMessage">Preparando tu experiencia...</div>

    <!-- Barra de carga -->
    <div class="loading-bar">
      <div class="loading-fill"></div>
    </div>

    <!-- Texto cargando -->
    <div class="loading-text">Cargando</div>
  </div>

  <script>
    (function() {
      // Generar partículas
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (6 + Math.random() * 6) + 's';
        particle.style.width = (2 + Math.random() * 6) + 'px';
        particle.style.height = particle.style.width;
        particle.style.opacity = 0.1 + Math.random() * 0.4;
        particlesContainer.appendChild(particle);
      }

      // Mensajes de bienvenida rotativos
      const messages = [
        '🎵 Sintonizando las mejores vibras...',
        '🔥 Preparando tus playlists...',
        '🎸 Cargando los éxitos del momento...',
        '💚 Conectando con la música...',
        '🌟 Tu experiencia premium está lista...',
        '🎧 Ajustando el sonido perfecto...'
      ];
      
      const welcomeEl = document.getElementById('welcomeMessage');
      let msgIndex = 0;
      
      setInterval(() => {
        msgIndex = (msgIndex + 1) % messages.length;
        welcomeEl.style.opacity = '0';
        setTimeout(() => {
          welcomeEl.textContent = messages[msgIndex];
          welcomeEl.style.opacity = '1';
        }, 200);
      }, 800);

      // Redirigir al index después de la intro
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 3800);

      // Verificar si ya se mostró la intro en esta sesión
      const introShown = sessionStorage.getItem('intro_shown');
      if (introShown === 'true') {
        // Si ya se mostró, ir directo al index
        window.location.href = 'index.html';
      } else {
        // Marcar que ya se mostró
        sessionStorage.setItem('intro_shown', 'true');
      }
    })();
  </script>

</body>
</html>
