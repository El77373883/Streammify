  <style>
    :root {
      --g: #1DB954;
      --g-dark: #0e6b31;
      --bk: #000;
      --d: #121212;
      --d2: #181818;
      --d3: #282828;
      --d4: #3e3e3e;
      --w: #fff;
      --gr: #b3b3b3;
      --gr2: #535353;
      --premium: linear-gradient(135deg, #1DB954 0%, #1ed760 50%, #4a9eff 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bk);
      color: var(--w);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Fondo animado */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, #0a2a1a 0%, #000 80%);
      z-index: -2;
    }

    .bg-particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.3;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--g);
      border-radius: 50%;
      animation: float 15s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    /* Contenedor principal */
    .login-container {
      width: 100%;
      max-width: 460px;
      z-index: 10;
      animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--premium);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 30px rgba(29, 185, 84, 0.3);
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .logo-text {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: var(--premium);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 14px;
      color: var(--gr);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Tarjeta principal */
    .login-card {
      background: var(--d2);
      border-radius: 32px;
      padding: 32px 28px;
      border: 1px solid var(--d3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      background: var(--d3);
      padding: 4px;
      border-radius: 40px;
    }

    .tab {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px;
      color: var(--gr);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 40px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .tab.active {
      background: var(--g);
      color: black;
      box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
    }

    /* Formularios */
    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gr);
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      fill: var(--gr2);
    }

    .input-field {
      width: 100%;
      background: var(--d3);
      border: 1.5px solid transparent;
      border-radius: 16px;
      padding: 16px 16px 16px 50px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }

    .input-field:focus {
      border-color: var(--g);
      background: var(--d4);
    }

    .input-field::placeholder {
      color: var(--gr2);
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 13px;
      color: var(--g);
      text-decoration: none;
      margin-top: 6px;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-primary {
      width: 100%;
      background: var(--g);
      border: none;
      border-radius: 40px;
      padding: 16px;
      color: black;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 24px;
      font-family: inherit;
    }

    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 25px rgba(29, 185, 84, 0.4);
    }

    /* Divisor */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0 24px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--d4);
    }

    .divider-text {
      font-size: 12px;
      color: var(--gr2);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Botones sociales */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--d3);
      border: 1px solid var(--d4);
      border-radius: 40px;
      padding: 14px 12px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .social-btn:hover {
      background: var(--d4);
      transform: translateY(-2px);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
    }

    .social-btn.google svg { fill: #4285F4; }
    .social-btn.facebook { background: #1877F2; border-color: #1877F2; }
    .social-btn.facebook svg { fill: white; }
    .social-btn.apple { background: #000; border-color: #333; }
    .social-btn.apple svg { fill: white; }
    .social-btn.twitter { background: #000; border-color: #333; }
    .social-btn.twitter svg { fill: white; }
    .social-btn.github { background: #24292e; border-color: #24292e; }
    .social-btn.github svg { fill: white; }
    .social-btn.microsoft svg { fill: #00a4ef; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--gr2);
    }

    .login-footer a {
      color: var(--g);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--d2);
      color: white;
      padding: 14px 28px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 1000;
      border: 1px solid var(--g);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.error {
      border-color: #e91429;
      background: #1a0a0a;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: black;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Back button */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      background: var(--d2);
      border: 1px solid var(--d3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .back-btn:hover {
      background: var(--d3);
      transform: scale(1.05);
    }

    .back-btn svg {
      width: 22px;
      height: 22px;
      fill: white;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        padding: 24px 20px;
      }
      .social-grid {
        grid-template-columns: 1fr;
      }
      .social-btn {
        padding: 12px;
      }
    }
  </style>
</head>

  <script>
    // Partículas de fondo
    (function() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 15 + 's';
        p.style.animationDuration = (10 + Math.random() * 10) + 's';
        container.appendChild(p);
      }
    })();

    // Tabs
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.form-panel');
    
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        panels.forEach(p => p.classList.remove('active'));
        document.getElementById(target + 'Panel').classList.add('active');
      });
    });

    // Toast
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      if (isError) toast.classList.add('error');
      else toast.classList.remove('error');
      setTimeout(() => {
        toast.classList.remove('show');
        toast.classList.remove('error');
      }, 3000);
    }

    // Loading state
    function setLoading(btn, isLoading) {
      if (isLoading) {
        btn.dataset.originalText = btn.textContent;
        btn.innerHTML = '<span class="spinner"></span> Cargando...';
        btn.disabled = true;
      } else {
        btn.textContent = btn.dataset.originalText;
        btn.disabled = false;
      }
    }

    // Login con Email
    async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  
  setLoading(btn, true);
  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    
    if (userDoc.exists()) {
      const data = userDoc.data();
      if (!data.plan) window.location.href = 'planes.html';
      else if (!data.profile?.name) window.location.href = 'crear-perfil.html';
      else window.location.href = 'index.html';
    } else {
      await setDoc(doc(db, 'users', user.uid), {
        name: user.displayName || 'StreamifyUser',
        email: user.email,
        plan: null,
        profile: null,
        setupComplete: false,
        createdAt: new Date().toISOString()
      });
      window.location.href = 'planes.html';
    }
    showToast('✅ ¡Bienvenido de vuelta!');
  } catch (error) {
    showToast('❌ ' + getErrorMessage(error.code), true);
    setLoading(btn, false);
  }
}

    // Registro con Email
    async function handleRegister(e) {
  e.preventDefault();
  const name = document.getElementById('registerName').value;
  const email = document.getElementById('registerEmail').value;
  const password = document.getElementById('registerPassword').value;
  const btn = document.getElementById('registerBtn');
  
  setLoading(btn, true);
  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;
    
    await setDoc(doc(db, 'users', user.uid), {
      name: name,
      email: email,
      plan: null,
      profile: null,
      setupComplete: false,
      createdAt: new Date().toISOString()
    });
    
    localStorage.setItem('userName', name);
    showToast('🎉 ¡Cuenta creada! Elige tu plan.');
    setTimeout(() => window.location.href = 'planes.html', 1000);
  } catch (error) {
    showToast('❌ ' + getErrorMessage(error.code), true);
    setLoading(btn, false);
  }
}

    function showForgotPassword() {
      const email = document.getElementById('loginEmail').value;
      if (!email) {
        showToast('❌ Ingresa tu correo primero', true);
        return;
      }
      sendPasswordResetEmail(auth, email)
        .then(() => showToast('📧 Revisa tu correo para restablecer'))
        .catch(() => showToast('❌ Error al enviar', true));
    }

    function getErrorMessage(code) {
      const messages = {
        'auth/invalid-email': 'Correo inválido',
        'auth/user-disabled': 'Usuario deshabilitado',
        'auth/user-not-found': 'Usuario no encontrado',
        'auth/wrong-password': 'Contraseña incorrecta',
        'auth/email-already-in-use': 'El correo ya está registrado',
        'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres',
        'auth/popup-closed-by-user': 'Ventana cerrada'
      };
      return messages[code] || 'Error desconocido';
    }

    // Exponer funciones globalmente
